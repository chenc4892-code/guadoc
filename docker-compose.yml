services:
  guadoc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guadoc
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3210}
      APP_ORIGIN: ${APP_ORIGIN:-https://doc.guagua.uk}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      DATA_DIR: ${DATA_DIR:-/app/data}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/guadoc.sqlite}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/data/uploads}
    ports:
      - "${PORT:-3210}:${PORT:-3210}"
    volumes:
      - guadoc_data:/app/data

volumes:
  guadoc_data:
