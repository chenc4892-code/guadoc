services:
  guadoc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guadoc
    restart: unless-stopped
    environment:
      PORT: 3210
      APP_ORIGIN: http://localhost:3210
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-me-now
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/guadoc.sqlite
      UPLOADS_DIR: /app/data/uploads
    ports:
      - "3210:3210"
    volumes:
      - guadoc_data:/app/data

volumes:
  guadoc_data:
